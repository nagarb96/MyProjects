<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #111;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }
        .slider {
            width: 600px;
            height: 350px;
            overflow: hidden;
            border-radius: 10px;
            box-shadow: 0 0 20px #000;
        }

        .slider img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition:  opicity 0.5s ease-in-out;
        }
        .show {
            opacity: 1;
        }
        .buttons button {
            margin: 20px 10px;
            padding: 10px 20px;
            font-size: 18px;
            background: #333;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="slider">
        <img id="slideImage" src="" alt="slider">
    </div>

    <div class="buttons">
        <button id="prev">Prev</button>
        <button id="next">Next</button>
    </div>

    <script>
        let images = ["images/1.png","images/2.png","images/3.png","images/4.png","images/5.png"];

        let slideImage = document.getElementById("slideImage");
        let nextBtn = document.getElementById("next");
        let prevBtn = document.getElementById("prev");

        let index = 0;

        // Step:1 show first image
        slideImage.classList.remove("show");
        setTimeout(() => {
            slideImage.src = images[index];
            slideImage.classList.add("show");
        },100);

        // step 2: next button
        nextBtn.addEventListener("click", () => {
            index++;
            if (index >= images.length) {
                index = 0;
            }
            slideImage.classList.remove("show");
            setTimeout(() => {
                slideImage.src = images[index];
                slideImage.classList.add("show");
        }, 100);
        });

        // step 3: previous button
        prevBtn.addEventListener("click", () => {
            index--;
            if (index < 0) {
                index = images.length -1;
            }
            slideImage.classList.remove("show");
            setTimeout(() => {
                slideImage.src = images[index];
                slideImage.classList.add("show");
        }, 100);
        });
        setInterval(() => {
    nextBtn.click();
}, 3000);
    </script>
</body>
</html>
