<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App</title>
    <style>
      body {
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        margin-top: 100px;
      }
      .container {
        background: #ffffff;
        width: 350px;
        text-align: center;
        border-radius: 12px;
        padding: 20px;
      }
      h2 {
        margin-bottom: 15px;
      }
      .input-section {
        display: flex;
        gap: 10px;
      }
      input {
        flex: 1;
        padding: 10px;
        border-radius: 6px;
        outline: none;
      }
      input:focus {
        border-color: #007bff;
      }
      button {
        padding: 10px 15px;
        border: none;
        background-color: #007bff;
        color: #ffffff;
        border-radius: 6px;
        cursor: pointer;
      }
      button:hover {
        background-color: #005fc5;
      }
      #taskList {
        margin-top: 15px;
        width: 100%;
      }
      #taskList li {
        list-style: none;
        padding: 10px;
        background: #f1f1f1;
        border-radius: 6px;
        margin-top: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #taskList li button {
        background: red;
        color: white;
        border: none;
        padding: 5px 8px;
        border-radius: 5px;
        cursor: pointer;
      }
      .done {
        text-decoration: line-through;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h2>Todo App</h2>
      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter your task...." />
        <button id="addBtn">Add</button>
      </div>
      <div id="taskList"></div>
    </div>

    <script>
      let taskInput = document.getElementById("taskInput");
      let addBtn = document.getElementById("addBtn");
      let taskList = document.getElementById("taskList");

      addBtn.addEventListener("click", () => {
        let text = taskInput.value;

        let li = document.createElement("li");
        li.textContent = text;

        // delete button
        let delBtn = document.createElement("button");
        delBtn.textContent = "Del";

        // delete button logic
        delBtn.addEventListener("click", () => {
          li.remove();
        });

        li.addEventListener("click", () => {
          li.classList.toggle("done");
        });

        li.appendChild(delBtn);
        taskList.appendChild(li);
        taskInput.value = "";
      });
    </script>
  </body>
</html>
