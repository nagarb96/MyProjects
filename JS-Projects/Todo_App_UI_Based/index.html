<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo App UI Based</title>
    <style>
      body {
        font-family: Arial;
        background: #f4f4f4;
        display: flex;
        justify-content: center;
        margin-top: 50px;
      }
      .container {
        background: white;
        padding: 20px;
        width: 300px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
      }
      input {
        width: 70%;
        padding: 8px;
      }
      button {
        padding: 8px;
        cursor: pointer;
        width: 65px;
      }
      ul {
        padding: 0;
      }
      li {
        list-style: none;
        margin-top: 10px;
        background: #eee;
        padding: 8px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      li button {
        background: rgb(247, 212, 212);
        color: white;
        border: none;
        cursor: pointer;
        padding: 5px;
      }
      .done {
        text-decoration: line-through;
        opacity: 0.6;
        background: greenyellow;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Todo App</h1>

      <div class="input-section">
        <input type="text" id="taskInput" placeholder="Enter task ..." />
        <button id="addBtn">Add</button>
      </div>

      <ul id="taskList"></ul>
    </div>
    <script>
      let addBtn = document.getElementById("addBtn");
      let taskInput = document.getElementById("taskInput");
      let taskList = document.getElementById("taskList");

      addBtn.addEventListener("click", () => {
        let task = taskInput.value;

        if (task === "") {
          alert("Please enter a task!");
          return;
        }
        let li = document.createElement("li");
        li.textContent = task;

        // Add Delete Button every task
        let delBtn = document.createElement("button");
        delBtn.textContent = "❌";

        //delete logic
        delBtn.addEventListener("click", () => {
          li.remove();
          saveData();
        });
        // Add when i press Enter to add task. mean when i click enter task will add in task list using .key
        taskInput.addEventListener("keypress", (e) => {
          if (e.key === "enter") {
            addBtn.click();
          }
        });
        // when task complete so done class property mean css run and background will be green. see like completed.
        li.addEventListener("click", () => {
          li.classList.toggle("done");
        });

        // Now we are save data in local storage.
        function saveData() {
          localStorage.setItem("tasks", taskList.innerHTML);
        }

        function loadData() {
          taskList.innerHTML = localStorage.getItem("tasks") || "";
        }
        loadData();

        li.appendChild(delBtn);
        taskList.appendChild(li);
        saveData();
        taskInput.value = "";
      });

      function addEventsToTasks() {
  let allLi = document.querySelectorAll("#taskList li");

  allLi.forEach(li => {

    // ✅ Complete toggle
    li.addEventListener("click", () => {
      li.classList.toggle("done");
      saveData();
    });

    // ✅ Delete button
    let btn = li.querySelector("button");
    btn.addEventListener("click", (e) => {
      e.stopPropagation(); // ❗ important
      li.remove();
      saveData();
    });

  });
}
function loadData() {
  taskList.innerHTML = localStorage.getItem("tasks") || "";
  addEventsToTasks(); // 🔥 ye line important
}
loadData();
taskList.appendChild(li);
saveData();
addEventsToTasks(); // 🔥
    </script>
  </body>
</html>
