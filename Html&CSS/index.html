<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ludo board</title>
    <style>
                * {
                  margin: 0;
                  padding: 0;
                  box-sizing: border-box;
                }
                body {
                  height: 100vh;
                  display: flex;
                  justify-content: center;
                  align-items: center;
                  background-color: #dadada;
                }
                .mainbox {
                  width: 90vw;
                  max-width: 600px;
                  height: auto;
                  aspect-ratio: 1 / 1;
                  background-color: rgb(255, 255, 255);
                  display: grid;
                  grid-template-columns: repeat(3, 1fr);
                  grid-template-rows: repeat(3, 1fr);
                }
                .mainbox .container {
                  width: 100%;
                  height: 100%;
                  border: 1px solid #fff;
                }
                .container1,.home_path_green {
                  background-color: green;
                }
                .container3 ,.home_path_blue{
                  background-color: blue;
                }
                .container7,.home_path_yellow {
                  background-color: yellow;
                }
                .container9, .home_path_red {
                  background-color: red;
                }
                .container1,
                .container3,
                .container7,
                .container9 {
                  padding: 5%;
                  display: grid;
                  place-items: center;
                  grid-template-columns: repeat(2, 1fr);
                  gap: 5%;
                }
                .buttons {
                  background-color: #fff;
                  border-radius: 5px;
                  width: 60%;
                  height: auto;
                  aspect-ratio: 1 / 1;
                  border: 3px solid rgba(0, 0, 0, 0.1);
                }
                .container2, .container8{
                  display: grid;
                  grid-template-columns: repeat(3, 1fr);
                  justify-content: center;
                }
                .container4, .container6{
                  display: grid;
                  grid-template-columns: repeat(5, 1fr);
                  justify-content: center;
                }
                .small-box {
                  border: 1px solid rgb(126, 126, 126);
                }
                .container5 {
                  height: 100%;
                  width: 100%;
                  background: conic-gradient(from 45deg,
              rgb(255, 0, 0) 0deg 90deg,
              rgb(251, 255, 0) 90deg 180deg,
              green 180deg 270deg,
              rgb(17, 0, 255) 270deg 360deg
            );
                }
                .small-box-stop {
                background: conic-gradient( from 45deg, red 0deg 90deg, yellow 90deg 180deg, blue 180deg 270deg, green 270deg 360deg);"
                }
                @media (max-width: 480px) {
          .mainbox {
              width: 95vw; /* Mobile par thoda aur bada dikhe */
          }

          .buttons {
              width: 60%; /* Mobile par gotiyan thodi badi dikhe */
          }
      }
    </style>
  </head>
  <body>
    <div class="mainbox">
      <div class="container container1">
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
      </div>
      <div class="container container2">
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_blue"></div>
        <div class="small-box small-box-stop home_path_blue"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_blue"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_blue"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_blue"></div>
        <div class="small-box"></div>
      </div>
      <div class="container container3">
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
      </div>
      <div class="container container4">
        <div class="small-box"></div>
        <div class="small-box small-box-stop home_path_green"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_green"></div>
        <div class="small-box home_path_green"></div>
        <div class="small-box home_path_green"></div>
        <div class="small-box home_path_green"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
      </div>
      <div class="container container5"></div>
      <div class="container container6">
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_red"></div>
        <div class="small-box home_path_red"></div>
        <div class="small-box home_path_red"></div>
        <div class="small-box home_path_red"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box small-box-stop home_path_red"></div>
        <div class="small-box"></div>
      </div>
      <div class="container container7">
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
      </div>
      <div class="container container8">
        <div class="small-box"></div>
        <div class="small-box home_path_yellow"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_yellow"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box home_path_yellow"></div>
        <div class="small-box"></div>
        <div class="small-box small-box-stop home_path_yellow"></div>
        <div class="small-box home_path_yellow"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
        <div class="small-box"></div>
      </div>
      <div class="container container9">
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
        <div class="buttons"></div>
      </div>
    </div>
  </body>
</html>
